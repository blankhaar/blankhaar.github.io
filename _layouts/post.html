---
layout: default
---
<article class="post">
  <p class="back"><a href="{{ '/blog/' | relative_url }}">← All notes</a></p>
  <header class="post-header">
    <h1>{{ page.title }}</h1>
    <p class="post-meta">{{ page.date | date: "%-d %B %Y" }}</p>
  </header>
  <div class="post-content">
    {{ content }}
  </div>
</article>
